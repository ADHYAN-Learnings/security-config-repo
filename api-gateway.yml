server:
  port: 8765
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
management:
  tracing:
    export:
      enabled: true
      zipkin:
        endpoint: http://zipkin:9411/api/v2/scans
    sampling:
      probability: 1.0
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"                                