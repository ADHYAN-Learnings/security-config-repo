server:
  port: 8183
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  tracing:
    export:
      enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/scans
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"          