server:
  port: 8183
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
management:
  tracing:
    export:
      enabled: true
      zipkin:
        endpoint: http://zipkin:9411/api/v2/scans
    sampling:
      probability: 1.0   
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"          